<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes float1 {
      0% { transform: translateY(0px) rotate(10deg); }
      50% { transform: translateY(-15px) rotate(15deg); }
      100% { transform: translateY(0px) rotate(10deg); }
    }
    @keyframes float2 {
      0% { transform: translateY(0px) rotate(-15deg); }
      50% { transform: translateY(20px) rotate(-10deg); }
      100% { transform: translateY(0px) rotate(-15deg); }
    }
    @keyframes float3 {
      0% { transform: translateY(0px) rotate(5deg); }
      50% { transform: translateY(-10px) rotate(0deg); }
      100% { transform: translateY(0px) rotate(5deg); }
    }
    .book1 { animation: float1 4s ease-in-out infinite; transform-origin: center; }
    .book2 { animation: float2 5s ease-in-out infinite; transform-origin: center; }
    .book3 { animation: float3 4.5s ease-in-out infinite; transform-origin: center; }
  </style>

  <!-- Sparkles -->
  <path d="M 50 50 L 55 40 L 60 50 L 70 55 L 60 60 L 55 70 L 50 60 L 40 55 Z" fill="#FF4A60" stroke="#0B0B0B" stroke-width="4"/>
  <path d="M 250 80 L 255 70 L 260 80 L 270 85 L 260 90 L 255 100 L 250 90 L 240 85 Z" fill="#1C92FF" stroke="#0B0B0B" stroke-width="4"/>

  <!-- Book 1 (Blue) -->
  <g class="book1">
    <rect x="40" y="100" width="120" height="150" rx="8" fill="#1C92FF" stroke="#0B0B0B" stroke-width="6" />
    <line x1="60" y1="130" x2="140" y2="130" stroke="#0B0B0B" stroke-width="6" stroke-linecap="round"/>
    <line x1="60" y1="160" x2="120" y2="160" stroke="#0B0B0B" stroke-width="6" stroke-linecap="round"/>
    <rect x="130" y="190" width="20" height="40" fill="#FFC224" stroke="#0B0B0B" stroke-width="5" />
  </g>

  <!-- Book 2 (Red) -->
  <g class="book2">
    <rect x="140" y="40" width="100" height="130" rx="8" fill="#FF4A60" stroke="#0B0B0B" stroke-width="6" />
    <circle cx="190" cy="100" r="25" fill="#FDE1D3" stroke="#0B0B0B" stroke-width="6"/>
  </g>

  <!-- Book 3 (Green) -->
  <g class="book3">
    <rect x="160" y="170" width="110" height="90" rx="8" fill="#81E644" stroke="#0B0B0B" stroke-width="6" />
    <path d="M 180 200 L 210 200 M 180 230 L 240 230" stroke="#0B0B0B" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
