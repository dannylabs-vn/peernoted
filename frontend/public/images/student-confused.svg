<svg width="615" height="615" viewBox="0 0 615 615" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    @keyframes float-reverse {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(20px) rotate(-5deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    @keyframes bob {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0px); }
    }
    .paper-1 { animation: float 4s ease-in-out infinite; transform-origin: center; }
    .paper-2 { animation: float-reverse 5s ease-in-out infinite; transform-origin: center; }
    .paper-3 { animation: float 6s ease-in-out infinite; transform-origin: center; }
    .paper-4 { animation: float-reverse 4.5s ease-in-out infinite; transform-origin: center; }
    .q-mark { animation: bob 2s ease-in-out infinite; transform-origin: center; }
  </style>

  <path d="M 150 615 L 150 400 C 150 350, 465 350, 465 400 L 465 615 Z" fill="#FFC224" stroke="#0B0B0B" stroke-width="6"/>
  <path d="M 250 400 Q 307 430 365 400 L 365 420 Q 307 450 250 420 Z" fill="#1C92FF" stroke="#0B0B0B" stroke-width="6"/>
  
  <rect x="280" y="320" width="55" height="80" fill="#FDE1D3" stroke="#0B0B0B" stroke-width="6"/>
  <rect x="220" y="160" width="175" height="180" rx="60" fill="#FDE1D3" stroke="#0B0B0B" stroke-width="6"/>
  <path d="M 200 220 C 200 120, 415 120, 415 220 Q 430 250 400 240 C 350 180, 260 180, 215 240 Q 185 250 200 220 Z" fill="#0B0B0B"/>
  
  <path d="M 255 240 L 285 270 M 285 240 L 255 270" stroke="#0B0B0B" stroke-width="6" stroke-linecap="round"/>
  <path d="M 330 240 L 360 270 M 360 240 L 330 270" stroke="#0B0B0B" stroke-width="6" stroke-linecap="round"/>
  
  <path d="M 280 300 L 290 290 L 305 300 L 315 290 L 330 300" stroke="#0B0B0B" stroke-width="6" stroke-linecap="round" fill="none"/>
  
  <path d="M 390 190 Q 400 170 410 190 Q 410 210 390 190 Z" fill="#1C92FF" stroke="#0B0B0B" stroke-width="4"/>

  <g class="paper-1">
    <rect x="50" y="250" width="100" height="140" rx="8" fill="white" stroke="#0B0B0B" stroke-width="5" transform="rotate(-15 100 320)"/>
    <line x1="70" y1="280" x2="130" y2="280" stroke="#0B0B0B" stroke-width="5" stroke-linecap="round" transform="rotate(-15 100 320)"/>
    <line x1="70" y1="310" x2="110" y2="310" stroke="#FF4A60" stroke-width="5" stroke-linecap="round" transform="rotate(-15 100 320)"/>
  </g>

  <g class="paper-2">
    <rect x="420" y="100" width="120" height="160" rx="8" fill="white" stroke="#0B0B0B" stroke-width="5" transform="rotate(25 480 180)"/>
    <line x1="440" y1="130" x2="520" y2="130" stroke="#0B0B0B" stroke-width="5" stroke-linecap="round" transform="rotate(25 480 180)"/>
    <line x1="440" y1="160" x2="490" y2="160" stroke="#1C92FF" stroke-width="5" stroke-linecap="round" transform="rotate(25 480 180)"/>
    <line x1="440" y1="190" x2="510" y2="190" stroke="#0B0B0B" stroke-width="5" stroke-linecap="round" transform="rotate(25 480 180)"/>
  </g>

  <g class="paper-3">
    <rect x="460" y="380" width="110" height="150" rx="8" fill="white" stroke="#0B0B0B" stroke-width="5" transform="rotate(-10 515 455)"/>
    <rect x="480" y="410" width="70" height="50" fill="#FFC224" stroke="#0B0B0B" stroke-width="5" transform="rotate(-10 515 455)"/>
    <line x1="480" y1="480" x2="530" y2="480" stroke="#0B0B0B" stroke-width="5" stroke-linecap="round" transform="rotate(-10 515 455)"/>
  </g>

  <g class="paper-4">
    <rect x="80" y="50" width="90" height="120" rx="8" fill="white" stroke="#0B0B0B" stroke-width="5" transform="rotate(15 125 110)"/>
    <circle cx="125" cy="110" r="20" fill="#81E644" stroke="#0B0B0B" stroke-width="5" transform="rotate(15 125 110)"/>
  </g>

  <g class="q-mark" style="animation-delay: 0s;">
    <text x="180" y="100" font-family="sans-serif" font-weight="bold" font-size="70" fill="#FF4A60" stroke="#0B0B0B" stroke-width="4">?</text>
  </g>
  <g class="q-mark" style="animation-delay: 0.5s;">
    <text x="360" y="80" font-family="sans-serif" font-weight="bold" font-size="90" fill="#1C92FF" stroke="#0B0B0B" stroke-width="4">?</text>
  </g>
  <g class="q-mark" style="animation-delay: 1s;">
    <text x="120" y="460" font-family="sans-serif" font-weight="bold" font-size="60" fill="#81E644" stroke="#0B0B0B" stroke-width="4">?</text>
  </g>
</svg>
