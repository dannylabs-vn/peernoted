name: Deploy to Render

on:
  push:
    branches: [master]
  workflow_dispatch: # cho phép trigger thủ công từ tab Actions

concurrency:
  group: render-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render server deploy
        if: ${{ env.SERVER_HOOK != '' }}
        env:
          SERVER_HOOK: ${{ secrets.RENDER_SERVER_HOOK }}
        run: |
          echo "Triggering server deploy..."
          curl -fsSL -X POST "$SERVER_HOOK" | head -c 500
          echo ""

      - name: Trigger Render client deploy
        if: ${{ env.CLIENT_HOOK != '' }}
        env:
          CLIENT_HOOK: ${{ secrets.RENDER_CLIENT_HOOK }}
        run: |
          echo "Triggering client deploy..."
          curl -fsSL -X POST "$CLIENT_HOOK" | head -c 500
          echo ""
